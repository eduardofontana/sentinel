default_policy: allow
detectors:
  brute_force:
    attempts_threshold: 10
    enabled: true
    time_window_seconds: 60
  dos:
    enabled: true
    packet_threshold: 200
    time_window_seconds: 5
  port_scan:
    enabled: true
  suspicious_payload:
    enabled: true
    profile: home
dashboard:
  enabled: true
  stats_interval_seconds: 1.0
  token: ''
  url: http://127.0.0.1:8000
firewall:
  enforce_system_block: false
  mode: observe
  enabled: true
  rules_file: config/firewall_rules.yaml
ids:
  enabled: true
  rules_file: rules/ids_home.rules
interface: eth0
log_level: INFO
packet_limit: 0
